flutter_native_splash:
  color: "#202020"
  color_dark: "#202020"
  color_android: "#202020"
  color_dark_android: "#202020"
  color_ios: "#202020"
  color_dark_ios: "#202020"

  # General images
  image: assets/images/icon_splash.png
  image_dark: assets/images/icon_splash.png

  # Platform-specific images
  image_android: assets/images/icon_splash.png
  image_dark_android: assets/images/icon_splash.png
  image_ios: assets/images/icon_splash.png

  # Branding
  branding: assets/images/branding.png
  branding_dark: assets/images/branding.png
  branding_android: assets/images/branding.png
  branding_dark_android: assets/images/branding.png
  branding_ios: assets/images/branding.png
  branding_dark_ios: assets/images/branding.png

  fullscreen: true

  # ANDROID 12+ configuration (Corrected Indentation)
  android_12:
    color: "#202020"
    color_dark: "#202020"
    image: assets/images/icon_splash.png
    image_dark: assets/images/icon_splash.png
    branding: assets/images/branding.png
    branding_dark: assets/images/branding.png